<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz - Transformação da Paisagem e Cartografia</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f7a, #0d3b4f);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #0d3b4f;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.2rem;
        }

        .progress-bar-container {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }

        .progress-bar {
            background: #28a745;
            height: 8px;
            width: 0%;
            transition: width 0.3s;
        }

        .main-content {
            padding: 30px;
            min-height: 450px;
        }

        .name-screen, .quiz-screen, .result-screen {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .name-form {
            text-align: center;
            padding: 20px;
        }

        .name-form input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            margin: 20px 0;
            text-align: center;
        }

        h2 {
            color: #0d3b4f;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0d3b4f;
            line-height: 1.4;
        }

        .options {
            list-style: none;
            padding-left: 0;
        }

        .options li {
            margin: 10px 0;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options li:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }

        .options li.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .options li.disabled:hover {
            transform: none;
        }

        .options li.selected {
            background: #1a5f7a;
            color: white;
            border-color: #1a5f7a;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            line-height: 1.5;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            display: block;
            border-left: 4px solid #28a745;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border-left: 4px solid #dc3545;
        }

        .btn {
            background: #1a5f7a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #0d3b4f;
            transform: scale(1.02);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .result-stats {
            text-align: center;
            padding: 20px;
            background: #f0f2f5;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .grade {
            font-size: 1.3rem;
            padding: 10px;
            border-radius: 30px;
            display: inline-block;
            margin: 10px 0;
        }

        .grade.aprovado { background: #d4edda; color: #155724; }
        .grade.reprovado { background: #f8d7da; color: #721c24; }

        .mistake-list {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .mistake-item {
            background: white;
            border-left: 4px solid #dc3545;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #666;
            font-size: 0.9rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 20px;
            }
            .question-text {
                font-size: 1rem;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🗺️ Quiz: Transformação da Paisagem e Cartografia</h1>
    </div>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // ==================== CONFIGURAÇÃO ====================
    let studentName = "";
    let currentQuestion = 0;
    let quizStarted = false;
    let userAnswers = [];
    
    // ==================== 20 QUESTÕES (TEMA 4) ====================
    const questionsData = [
        { text: "A paisagem, para a geografia cultural, é definida como:", options: ["Apenas os elementos naturais do ambiente", "Uma 'maneira de ver o mundo', carregada de valores culturais e ideológicos", "Somente as construções humanas", "Um conceito exclusivamente biológico"], correct: 1, justification: "Denis Cosgrove definiu paisagem como uma 'maneira de ver o mundo', carregada de valores culturais." },
        
        { text: "A paisagem acumula diferentes tempos sobrepostos, funcionando como um:", options: ["Mapa estático", "Palimpsesto ou documento histórico", "Fotografia instantânea", "Território vazio"], correct: 1, justification: "A paisagem é como um palimpsesto, com camadas de diferentes períodos históricos sobrepostas." },
        
        { text: "No Brasil, a camada temporal da paisagem correspondente ao período colonial inclui:", options: ["Trilhas indígenas e terra preta", "Cidades históricas, igrejas e engenhos de cana", "Estradas de ferro e palácios imperiais", "Shopping centers e condomínios fechados"], correct: 1, justification: "O período colonial deixou cidades históricas, igrejas barrocas e engenhos de cana-de-açúcar." },
        
        { text: "A cartografia é a ciência e a arte de:", options: ["Estudar o clima", "Representar o espaço geográfico em mapas", "Analisar a população", "Classificar os solos"], correct: 1, justification: "Cartografia é a representação gráfica do espaço geográfico." },
        
        { text: "A projeção cartográfica de Mercator é conhecida por:", options: ["Conservar perfeitamente as áreas dos continentes", "Ampliar exageradamente as áreas polares, supervalorizando a Europa", "Ser a mais precisa para áreas equatoriais", "Não distorcer nenhuma propriedade espacial"], correct: 1, justification: "Mercator amplia as altas latitudes, fazendo a Europa parecer maior que a África e América do Sul." },
        
        { text: "A escolha de uma projeção cartográfica em detrimento de outra é considerada:", options: ["Uma decisão meramente técnica e neutra", "Uma escolha política, carregada de intencionalidades", "Um erro científico", "Uma questão exclusivamente estética"], correct: 1, justification: "Toda projeção distorce algo; a escolha reflete visões de mundo e relações de poder." },
        
        { text: "A projeção de Peters (1973) foi proposta como uma alternativa à projeção de Mercator porque:", options: ["É mais bonita esteticamente", "Conserva as áreas, denunciando a visão eurocêntrica de Mercator", "É mais antiga e tradicional", "Foi desenvolvida para navegação espacial"], correct: 1, justification: "Peters é uma projeção equivalente (conserva áreas), criticando a supervalorização europeia de Mercator." },
        
        { text: "O GPS (Sistema de Posicionamento Global) é uma tecnologia que permite:", options: ["Mapear o fundo dos oceanos", "Localizar pontos na superfície terrestre com alta precisão", "Prever terremotos", "Medir a poluição do ar"], correct: 1, justification: "GPS utiliza satélites para determinar coordenadas geográficas precisas." },
        
        { text: "O LiDAR (Light Detection and Ranging) é uma geotecnologia que utiliza:", options: ["Ondas de rádio", "Pulsos de laser para mapear superfícies em 3D", "Imagens de satélite convencionais", "Sensores de calor"], correct: 1, justification: "LiDAR usa pulsos de laser que penetram cobertura vegetal para mapear o solo abaixo." },
        
        { text: "O SAR (Synthetic Aperture Radar) é especialmente útil para:", options: ["Mapeamento diurno apenas", "Produzir imagens mesmo com cobertura de nuvens", "Navegação submarina", "Medir temperatura da água"], correct: 1, justification: "SAR é um radar imageador que funciona mesmo com nuvens, essencial para monitorar a Amazônia." },
        
        { text: "O SIG (Sistema de Informação Geográfica) permite:", options: ["Apenas visualizar mapas", "Armazenar, analisar e visualizar dados geográficos", "Imprimir mapas em 3D", "Navegar por satélite"], correct: 1, justification: "SIG integra dados espaciais, permitindo análise e sobreposição de camadas de informação." },
        
        { text: "O PRODES, programa do INPE, tem como objetivo:", options: ["Mapear áreas urbanas", "Monitorar o desmatamento na Amazônia Legal", "Prever o clima", "Estudar oceanos"], correct: 1, justification: "PRODES produz taxas anuais de desmatamento na Amazônia desde 1988." },
        
        { text: "O DETER é um sistema complementar ao PRODES que oferece:", options: ["Mapas geológicos", "Alertas quase diários sobre novos focos de desmatamento", "Previsão de queimadas", "Monitoramento de enchentes"], correct: 1, justification: "DETER emite alertas rápidos para orientar ações de fiscalização ambiental." },
        
        { text: "A paisagem pode ser interpretada de diferentes formas porque:", options: ["É um fenômeno puramente natural", "Carrega valores culturais, ideologias e relações de poder", "Não tem significado", "É igual em todo o mundo"], correct: 1, justification: "A paisagem é uma construção social e cultural, sujeita a múltiplas interpretações." },
        
        { text: "Um exemplo de camada temporal pré-colonial na paisagem brasileira é:", options: ["Cidades históricas coloniais", "Estradas de ferro do século XIX", "Terra preta de índio e trilhas indígenas", "Shopping centers modernos"], correct: 2, justification: "Terra preta de índio e trilhas são vestígios da ocupação pré-colonial." },
        
        { text: "As geotecnologias modernas incluem, EXCETO:", options: ["GPS diferencial", "LiDAR", "Bússola manual", "SIG temporal"], correct: 2, justification: "Bússola é uma tecnologia antiga, não uma geotecnologia moderna." },
        
        { text: "Analise as afirmativas sobre a paisagem: I - É apenas o que se vê. II - Também é o que se vivencia e interpreta. III - Pode ser lida como documento histórico. Assinale a alternativa correta:", options: ["Apenas I e II estão corretas", "Apenas I e III estão corretas", "Apenas II e III estão corretas", "Todas estão corretas"], correct: 2, justification: "A paisagem não é apenas visual, mas também vivenciada e interpretada, funcionando como documento histórico." },
        
        { text: "A projeção cartográfica que conserva as áreas (equivalente) é uma característica de qual projeção?", options: ["Mercator", "Robinson", "Peters", "Winkel-Tripel"], correct: 2, justification: "A projeção de Peters é equivalente (conserva áreas), ao contrário de Mercator." },
        
        { text: "O conceito de 'paisagem como palimpsesto' significa que:", options: ["A paisagem é sempre nova", "A paisagem acumula camadas de diferentes tempos históricos", "A paisagem não muda", "A paisagem é apenas natural"], correct: 1, justification: "Palimpsesto é um manuscrito com camadas sobrepostas; analogamente, a paisagem acumula diferentes períodos históricos." },
        
        { text: "A cartografia crítica alerta que os mapas não são neutros porque:", options: ["Sempre contêm erros", "Refletem interesses, valores e relações de poder de quem os produz", "São feitos apenas por computadores", "Não têm legenda"], correct: 1, justification: "Mapas são representações carregadas de intencionalidades e visões de mundo." }
    ];
    
    // ==================== FUNÇÕES ====================
    function updateProgressBar() {
        const percent = ((currentQuestion + 1) / questionsData.length) * 100;
        document.getElementById('progressBar').style.width = percent + '%';
    }
    
    function renderNameScreen() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="name-screen name-form">
                <h2>📝 Identificação</h2>
                <p>Digite seu nome completo para iniciar o quiz:</p>
                <input type="text" id="studentNameInput" placeholder="Seu nome" autocomplete="off">
                <br>
                <button class="btn btn-success" id="startQuizBtn">▶️ Iniciar Quiz</button>
            </div>
        `;
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            const input = document.getElementById('studentNameInput');
            if (input && input.value.trim()) {
                studentName = input.value.trim();
                quizStarted = true;
                userAnswers = new Array(questionsData.length).fill(null);
                currentQuestion = 0;
                renderQuestion();
            } else {
                alert("Por favor, digite seu nome.");
            }
        });
    }
    
    function renderQuestion() {
        const q = questionsData[currentQuestion];
        const isAnswered = userAnswers[currentQuestion] !== null;
        const selectedAnswer = userAnswers[currentQuestion];
        
        let optionsHtml = '<ul class="options">';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedAnswer === idx);
            optionsHtml += `<li data-opt="${idx}" class="${isAnswered ? 'disabled' : ''} ${isSelected ? 'selected' : ''}">${opt}</li>`;
        });
        optionsHtml += '</ul>';
        
        const feedbackHtml = isAnswered ? `
            <div class="feedback ${userAnswers[currentQuestion] === q.correct ? 'correct' : 'wrong'}">
                <strong>${userAnswers[currentQuestion] === q.correct ? '✓ Correto!' : '✗ Incorreto!'}</strong><br>
                ${q.justification}
            </div>
        ` : '';
        
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="quiz-screen">
                <div class="question-info">
                    <span>Questão ${currentQuestion + 1} de ${questionsData.length}</span>
                    <span>${Math.round(((currentQuestion + 1) / questionsData.length) * 100)}%</span>
                </div>
                <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
                ${optionsHtml}
                ${feedbackHtml}
                <div class="nav-buttons">
                    <button class="btn" id="prevBtn" ${currentQuestion === 0 ? 'disabled' : ''}>◀ Anterior</button>
                    <button class="btn" id="nextBtn" ${!isAnswered ? 'disabled' : ''}>${currentQuestion === questionsData.length - 1 ? '✅ Finalizar' : 'Próxima ▶'}</button>
                </div>
            </div>
        `;
        
        const options = document.querySelectorAll('.options li');
        options.forEach(opt => {
            opt.addEventListener('click', () => {
                if (userAnswers[currentQuestion] !== null) return;
                const selected = parseInt(opt.dataset.opt);
                userAnswers[currentQuestion] = selected;
                renderQuestion();
            });
        });
        
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });
        
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (userAnswers[currentQuestion] === null) return;
            if (currentQuestion === questionsData.length - 1) {
                calculateResult();
            } else {
                currentQuestion++;
                renderQuestion();
            }
        });
        
        updateProgressBar();
    }
    
    function calculateResult() {
        let correctCount = 0;
        const mistakes = [];
        
        questionsData.forEach((q, idx) => {
            const userAnswer = userAnswers[idx];
            if (userAnswer === q.correct) {
                correctCount++;
            } else {
                mistakes.push({
                    number: idx + 1,
                    question: q.text,
                    userAnswer: userAnswer !== null ? q.options[userAnswer] : "Não respondida",
                    correctAnswer: q.options[q.correct],
                    justification: q.justification
                });
            }
        });
        
        const approved = correctCount >= 14;
        renderResultScreen(correctCount, approved, mistakes);
    }
    
    function renderResultScreen(score, approved, mistakes) {
        const main = document.getElementById('mainContent');
        const gradeText = approved ? "APROVADO" : "REPROVADO";
        const gradeClass = approved ? "aprovado" : "reprovado";
        
        let mistakesHtml = '';
        if (mistakes.length > 0) {
            mistakesHtml = `<h3>📋 Questões com erro:</h3><div class="mistake-list">`;
            mistakes.forEach(m => {
                mistakesHtml += `
                    <div class="mistake-item">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
            mistakesHtml += `</div>`;
        } else {
            mistakesHtml = `<p style="color:#155724; background:#d4edda; padding:15px; border-radius:12px;">🎉 Parabéns! Você não errou nenhuma questão!</p>`;
        }
        
        main.innerHTML = `
            <div class="result-screen">
                <div class="result-stats">
                    <h2>📊 Resultado Final</h2>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${new Date().toLocaleString('pt-BR')}</p>
                    <div class="score">${score} / 20</div>
                    <div class="grade ${gradeClass}">${gradeText}</div>
                    ${approved ? '<p>✅ Você atingiu a nota mínima (14/20). Relatório liberado!</p>' : '<p>❌ Você não atingiu a nota mínima (14/20). Estude mais e refaça o quiz.</p>'}
                </div>
                ${mistakesHtml}
                <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    ${approved ? `<button class="btn btn-success" id="printReportBtn">📄 Gerar Relatório PDF</button>` : ''}
                    <button class="btn btn-secondary" id="restartQuizBtn">🔄 Refazer Quiz</button>
                </div>
            </div>
        `;
        
        if (approved) {
            document.getElementById('printReportBtn')?.addEventListener('click', () => {
                generatePDFReport(score, mistakes);
            });
        }
        
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            userAnswers = new Array(questionsData.length).fill(null);
            quizStarted = false;
            currentQuestion = 0;
            renderNameScreen();
            document.getElementById('progressBar').style.width = '0%';
        });
    }
    
    function generatePDFReport(score, mistakes) {
        const printWindow = window.open('', '_blank');
        const dateStr = new Date().toLocaleString('pt-BR');
        let mistakesPrint = '';
        
        if (mistakes.length > 0) {
            mistakesPrint = '<h3>Questões com erro:</h3>';
            mistakes.forEach(m => {
                mistakesPrint += `
                    <div style="margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #ccc;">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
        } else {
            mistakesPrint = '<p>Parabéns! Você acertou todas as questões!</p>';
        }
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Relatório - Transformação da Paisagem e Cartografia</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.5; }
                    h1 { color: #1a5f7a; }
                    .header { text-align: center; margin-bottom: 30px; }
                    .score { font-size: 24px; font-weight: bold; margin: 20px 0; }
                    .approved { color: green; }
                    @media print {
                        body { margin: 20px; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>Relatório de Desempenho</h1>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${dateStr}</p>
                    <p><strong>Quiz:</strong> Transformação da Paisagem e Cartografia</p>
                    <div class="score">Nota: ${score} / 20</div>
                    <div class="approved">✅ APROVADO (mínimo 14)</div>
                </div>
                ${mistakesPrint}
                <hr>
                <p style="font-size: 12px; color: #666;">Relatório gerado automaticamente pelo sistema de quiz.</p>
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }
    
    renderNameScreen();
</script>
</body>
</html>
