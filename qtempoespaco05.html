<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz - Geotecnologias e Análise Territorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f7a, #0d3b4f);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #0d3b4f;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.2rem;
        }

        .progress-bar-container {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }

        .progress-bar {
            background: #28a745;
            height: 8px;
            width: 0%;
            transition: width 0.3s;
        }

        .main-content {
            padding: 30px;
            min-height: 450px;
        }

        .name-screen, .quiz-screen, .result-screen {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .name-form {
            text-align: center;
            padding: 20px;
        }

        .name-form input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            margin: 20px 0;
            text-align: center;
        }

        h2 {
            color: #0d3b4f;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0d3b4f;
            line-height: 1.4;
        }

        .options {
            list-style: none;
            padding-left: 0;
        }

        .options li {
            margin: 10px 0;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options li:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }

        .options li.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .options li.disabled:hover {
            transform: none;
        }

        .options li.selected {
            background: #1a5f7a;
            color: white;
            border-color: #1a5f7a;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            line-height: 1.5;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            display: block;
            border-left: 4px solid #28a745;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border-left: 4px solid #dc3545;
        }

        .btn {
            background: #1a5f7a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #0d3b4f;
            transform: scale(1.02);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .result-stats {
            text-align: center;
            padding: 20px;
            background: #f0f2f5;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .grade {
            font-size: 1.3rem;
            padding: 10px;
            border-radius: 30px;
            display: inline-block;
            margin: 10px 0;
        }

        .grade.aprovado { background: #d4edda; color: #155724; }
        .grade.reprovado { background: #f8d7da; color: #721c24; }

        .mistake-list {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .mistake-item {
            background: white;
            border-left: 4px solid #dc3545;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #666;
            font-size: 0.9rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 20px;
            }
            .question-text {
                font-size: 1rem;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛰️ Quiz: Geotecnologias e Análise Territorial</h1>
    </div>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // ==================== CONFIGURAÇÃO ====================
    let studentName = "";
    let currentQuestion = 0;
    let quizStarted = false;
    let userAnswers = [];
    
    // ==================== 20 QUESTÕES (TEMA 5) ====================
    const questionsData = [
        { text: "A geotecnologia que utiliza satélites para determinar coordenadas geográficas precisas é:", options: ["SIG", "GPS", "LiDAR", "SAR"], correct: 1, justification: "GPS (Global Positioning System) utiliza satélites para localização precisa na superfície terrestre." },
        
        { text: "O SIG (Sistema de Informação Geográfica) permite ao usuário:", options: ["Apenas visualizar mapas estáticos", "Armazenar, analisar e sobrepor camadas de dados geográficos", "Imprimir mapas em 3D", "Navegar por satélite em tempo real"], correct: 1, justification: "SIG integra dados espaciais, permitindo análises complexas e sobreposição de camadas." },
        
        { text: "A tecnologia LiDAR é especialmente útil para:", options: ["Navegação marítima", "Mapeamento de sítios arqueológicos cobertos por florestas", "Previsão do tempo", "Comunicação via satélite"], correct: 1, justification: "LiDAR usa pulsos de laser que penetram a cobertura vegetal, revelando o solo abaixo." },
        
        { text: "O SAR (Synthetic Aperture Radar) é vantajoso porque:", options: ["Funciona apenas durante o dia", "Produz imagens mesmo com cobertura de nuvens", "É mais barato que outras tecnologias", "Não requer processamento de dados"], correct: 1, justification: "SAR é um radar imageador que funciona independentemente das condições climáticas." },
        
        { text: "O PRODES, programa do INPE, tem como principal função:", options: ["Mapear áreas de mineração", "Monitorar o desmatamento na Amazônia Legal", "Prever desastres naturais", "Estudar mudanças climáticas"], correct: 1, justification: "PRODES produz taxas anuais de desmatamento na Amazônia desde 1988." },
        
        { text: "O sistema DETER complementa o PRODES fornecendo:", options: ["Mapas geológicos detalhados", "Alertas quase diários sobre novos focos de desmatamento", "Previsões de safra agrícola", "Dados populacionais"], correct: 1, justification: "DETER emite alertas rápidos para orientar ações de fiscalização ambiental." },
        
        { text: "O conceito de 'território', na abordagem política associada a Ratzel, enfatiza:", options: ["O território como espaço vivido e identidade cultural", "O território como extensão do poder do Estado e espaço vital", "O território como rede de fluxos e conexões", "O território como espaço sagrado"], correct: 1, justification: "Ratzel via o território como espaço vital (Lebensraum) e extensão do poder estatal." },
        
        { text: "O território pode ser analisado em diferentes escalas. A escala do bairro ou da cidade é chamada de escala:", options: ["Corporal", "Local", "Regional", "Global"], correct: 1, justification: "A escala local abrange o bairro, a vizinhança ou a cidade pequena." },
        
        { text: "A cartografia social é uma ferramenta importante porque:", options: ["Substitui mapas oficiais", "Permite que comunidades tradicionais elaborem seus próprios mapas, indicando usos e territórios", "É feita apenas por satélites", "Não requer participação comunitária"], correct: 1, justification: "A cartografia social valoriza o conhecimento local e a participação das comunidades." },
        
        { text: "O método de análise territorial que sobrepõe diferentes mapas temáticos para identificar áreas críticas é amplamente utilizado por:", options: ["Apenas pelo IBGE", "Pelo Instituto Socioambiental (ISA) e pela CPT", "Exclusivamente pelo Exército", "Somente por empresas privadas"], correct: 1, justification: "ISA e CPT usam essa metodologia para produzir relatórios sobre conflitos na Amazônia." },
        
        { text: "Os mapas temáticos diferem dos mapas gerais porque:", options: ["São menos precisos", "Focam em um único tema ou fenômeno", "Não usam legendas", "São apenas políticos"], correct: 1, justification: "Mapas temáticos concentram-se em um tema específico, como densidade populacional ou clima." },
        
        { text: "Um mapa coroplético é aquele que:", options: ["Usa pontos para representar ocorrências", "Utiliza áreas coloridas conforme o valor de um indicador", "Mostra fluxos entre pontos", "Distorce áreas para representar dados"], correct: 1, justification: "Mapas coropléticos usam cores ou hachuras para representar a distribuição de fenômenos quantitativos." },
        
        { text: "O conceito de 'território usado', proposto por Milton Santos, enfatiza:", options: ["O território como espaço sagrado", "O território como espaço produtivo e lócus da circulação", "O território como extensão do poder militar", "O território como vazio"], correct: 1, justification: "Para Santos, o território usado é o espaço onde ocorrem produção, circulação e consumo." },
        
        { text: "A análise territorial integrada na Amazônia envolve a sobreposição de mapas de:", options: ["Apenas vegetação", "Apenas propriedades fundiárias", "Vegetação, fundiário, queimadas, terras indígenas e violência", "Apenas clima"], correct: 2, justification: "A sobreposição de múltiplas camadas permite identificar áreas críticas de conflito e desmatamento." },
        
        { text: "A escala territorial que abrange o espaço íntimo, como a casa ou o quarto, é chamada de escala:", options: ["Local", "Regional", "Corporal", "Global"], correct: 2, justification: "A escala corporal é o espaço mais íntimo e imediato do indivíduo." },
        
        { text: "O sensoriamento remoto é uma técnica que permite:", options: ["Obter informações sobre a superfície terrestre sem contato direto", "Medir temperatura do solo manualmente", "Coletar amostras de rochas", "Fazer escavações arqueológicas"], correct: 0, justification: "Sensoriamento remoto utiliza satélites e aeronaves para coletar dados à distância." },
        
        { text: "Analise as afirmativas sobre geotecnologias: I - O GPS é usado apenas para navegação veicular. II - O SIG permite análise espacial avançada. III - O LiDAR é útil para arqueologia. Assinale a alternativa correta:", options: ["Apenas I e II estão corretas", "Apenas I e III estão corretas", "Apenas II e III estão corretas", "Todas estão corretas"], correct: 2, justification: "GPS tem múltiplos usos (agricultura, geodésia); SIG e LiDAR estão corretos." },
        
        { text: "O 'DETER' é um sistema do INPE que oferece:", options: ["Dados demográficos", "Alertas de desmatamento em tempo quase real", "Mapas de solos", "Previsões climáticas"], correct: 1, justification: "DETER (Detecção de Desmatamento em Tempo Real) emite alertas frequentes para fiscalização." },
        
        { text: "A abordagem cultural do território, associada a geógrafos como Claval e Haesbaert, enfatiza:", options: ["O território como espaço de poder militar", "O território como espaço vivido, identidade e pertencimento", "O território como mercadoria", "O território como vazio"], correct: 1, justification: "A abordagem cultural destaca as identidades, memórias e sentimentos ligados ao território." },
        
        { text: "O GPS diferencial permite aplicações com precisão centimétrica, sendo utilizado em:", options: ["Navegação por aplicativos de celular", "Agricultura de precisão e georreferenciamento de alta acurácia", "Mapas de ruas convencionais", "Previsão do tempo"], correct: 1, justification: "O GPS diferencial corrige erros, permitindo precisão centimétrica em aplicações especializadas." }
    ];
    
    // ==================== FUNÇÕES ====================
    function updateProgressBar() {
        const percent = ((currentQuestion + 1) / questionsData.length) * 100;
        document.getElementById('progressBar').style.width = percent + '%';
    }
    
    function renderNameScreen() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="name-screen name-form">
                <h2>📝 Identificação</h2>
                <p>Digite seu nome completo para iniciar o quiz:</p>
                <input type="text" id="studentNameInput" placeholder="Seu nome" autocomplete="off">
                <br>
                <button class="btn btn-success" id="startQuizBtn">▶️ Iniciar Quiz</button>
            </div>
        `;
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            const input = document.getElementById('studentNameInput');
            if (input && input.value.trim()) {
                studentName = input.value.trim();
                quizStarted = true;
                userAnswers = new Array(questionsData.length).fill(null);
                currentQuestion = 0;
                renderQuestion();
            } else {
                alert("Por favor, digite seu nome.");
            }
        });
    }
    
    function renderQuestion() {
        const q = questionsData[currentQuestion];
        const isAnswered = userAnswers[currentQuestion] !== null;
        const selectedAnswer = userAnswers[currentQuestion];
        
        let optionsHtml = '<ul class="options">';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedAnswer === idx);
            optionsHtml += `<li data-opt="${idx}" class="${isAnswered ? 'disabled' : ''} ${isSelected ? 'selected' : ''}">${opt}</li>`;
        });
        optionsHtml += '</ul>';
        
        const feedbackHtml = isAnswered ? `
            <div class="feedback ${userAnswers[currentQuestion] === q.correct ? 'correct' : 'wrong'}">
                <strong>${userAnswers[currentQuestion] === q.correct ? '✓ Correto!' : '✗ Incorreto!'}</strong><br>
                ${q.justification}
            </div>
        ` : '';
        
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="quiz-screen">
                <div class="question-info">
                    <span>Questão ${currentQuestion + 1} de ${questionsData.length}</span>
                    <span>${Math.round(((currentQuestion + 1) / questionsData.length) * 100)}%</span>
                </div>
                <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
                ${optionsHtml}
                ${feedbackHtml}
                <div class="nav-buttons">
                    <button class="btn" id="prevBtn" ${currentQuestion === 0 ? 'disabled' : ''}>◀ Anterior</button>
                    <button class="btn" id="nextBtn" ${!isAnswered ? 'disabled' : ''}>${currentQuestion === questionsData.length - 1 ? '✅ Finalizar' : 'Próxima ▶'}</button>
                </div>
            </div>
        `;
        
        const options = document.querySelectorAll('.options li');
        options.forEach(opt => {
            opt.addEventListener('click', () => {
                if (userAnswers[currentQuestion] !== null) return;
                const selected = parseInt(opt.dataset.opt);
                userAnswers[currentQuestion] = selected;
                renderQuestion();
            });
        });
        
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });
        
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (userAnswers[currentQuestion] === null) return;
            if (currentQuestion === questionsData.length - 1) {
                calculateResult();
            } else {
                currentQuestion++;
                renderQuestion();
            }
        });
        
        updateProgressBar();
    }
    
    function calculateResult() {
        let correctCount = 0;
        const mistakes = [];
        
        questionsData.forEach((q, idx) => {
            const userAnswer = userAnswers[idx];
            if (userAnswer === q.correct) {
                correctCount++;
            } else {
                mistakes.push({
                    number: idx + 1,
                    question: q.text,
                    userAnswer: userAnswer !== null ? q.options[userAnswer] : "Não respondida",
                    correctAnswer: q.options[q.correct],
                    justification: q.justification
                });
            }
        });
        
        const approved = correctCount >= 14;
        renderResultScreen(correctCount, approved, mistakes);
    }
    
    function renderResultScreen(score, approved, mistakes) {
        const main = document.getElementById('mainContent');
        const gradeText = approved ? "APROVADO" : "REPROVADO";
        const gradeClass = approved ? "aprovado" : "reprovado";
        
        let mistakesHtml = '';
        if (mistakes.length > 0) {
            mistakesHtml = `<h3>📋 Questões com erro:</h3><div class="mistake-list">`;
            mistakes.forEach(m => {
                mistakesHtml += `
                    <div class="mistake-item">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
            mistakesHtml += `</div>`;
        } else {
            mistakesHtml = `<p style="color:#155724; background:#d4edda; padding:15px; border-radius:12px;">🎉 Parabéns! Você não errou nenhuma questão!</p>`;
        }
        
        main.innerHTML = `
            <div class="result-screen">
                <div class="result-stats">
                    <h2>📊 Resultado Final</h2>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${new Date().toLocaleString('pt-BR')}</p>
                    <div class="score">${score} / 20</div>
                    <div class="grade ${gradeClass}">${gradeText}</div>
                    ${approved ? '<p>✅ Você atingiu a nota mínima (14/20). Relatório liberado!</p>' : '<p>❌ Você não atingiu a nota mínima (14/20). Estude mais e refaça o quiz.</p>'}
                </div>
                ${mistakesHtml}
                <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    ${approved ? `<button class="btn btn-success" id="printReportBtn">📄 Gerar Relatório PDF</button>` : ''}
                    <button class="btn btn-secondary" id="restartQuizBtn">🔄 Refazer Quiz</button>
                </div>
            </div>
        `;
        
        if (approved) {
            document.getElementById('printReportBtn')?.addEventListener('click', () => {
                generatePDFReport(score, mistakes);
            });
        }
        
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            userAnswers = new Array(questionsData.length).fill(null);
            quizStarted = false;
            currentQuestion = 0;
            renderNameScreen();
            document.getElementById('progressBar').style.width = '0%';
        });
    }
    
    function generatePDFReport(score, mistakes) {
        const printWindow = window.open('', '_blank');
        const dateStr = new Date().toLocaleString('pt-BR');
        let mistakesPrint = '';
        
        if (mistakes.length > 0) {
            mistakesPrint = '<h3>Questões com erro:</h3>';
            mistakes.forEach(m => {
                mistakesPrint += `
                    <div style="margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #ccc;">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
        } else {
            mistakesPrint = '<p>Parabéns! Você acertou todas as questões!</p>';
        }
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Relatório - Geotecnologias e Análise Territorial</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.5; }
                    h1 { color: #1a5f7a; }
                    .header { text-align: center; margin-bottom: 30px; }
                    .score { font-size: 24px; font-weight: bold; margin: 20px 0; }
                    .approved { color: green; }
                    @media print {
                        body { margin: 20px; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>Relatório de Desempenho</h1>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${dateStr}</p>
                    <p><strong>Quiz:</strong> Geotecnologias e Análise Territorial</p>
                    <div class="score">Nota: ${score} / 20</div>
                    <div class="approved">✅ APROVADO (mínimo 14)</div>
                </div>
                ${mistakesPrint}
                <hr>
                <p style="font-size: 12px; color: #666;">Relatório gerado automaticamente pelo sistema de quiz.</p>
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }
    
    renderNameScreen();
</script>
</body>
</html>
