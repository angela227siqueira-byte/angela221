<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz - Tempo e Espaço</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f7a, #0d3b4f);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #0d3b4f;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.3rem;
        }

        .progress-bar-container {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }

        .progress-bar {
            background: #28a745;
            height: 8px;
            width: 0%;
            transition: width 0.3s;
        }

        .main-content {
            padding: 30px;
            min-height: 450px;
        }

        .name-screen, .quiz-screen, .result-screen {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .name-form {
            text-align: center;
            padding: 20px;
        }

        .name-form input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            margin: 20px 0;
            text-align: center;
        }

        h2 {
            color: #0d3b4f;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0d3b4f;
            line-height: 1.4;
        }

        .options {
            list-style: none;
            padding-left: 0;
        }

        .options li {
            margin: 10px 0;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options li:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }

        .options li.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .options li.disabled:hover {
            transform: none;
        }

        .options li.selected {
            background: #1a5f7a;
            color: white;
            border-color: #1a5f7a;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            line-height: 1.5;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            display: block;
            border-left: 4px solid #28a745;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border-left: 4px solid #dc3545;
        }

        .btn {
            background: #1a5f7a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #0d3b4f;
            transform: scale(1.02);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .result-stats {
            text-align: center;
            padding: 20px;
            background: #f0f2f5;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .grade {
            font-size: 1.3rem;
            padding: 10px;
            border-radius: 30px;
            display: inline-block;
            margin: 10px 0;
        }

        .grade.aprovado { background: #d4edda; color: #155724; }
        .grade.reprovado { background: #f8d7da; color: #721c24; }

        .mistake-list {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .mistake-item {
            background: white;
            border-left: 4px solid #dc3545;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #666;
            font-size: 0.9rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 20px;
            }
            .question-text {
                font-size: 1rem;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌍 Quiz: Tempo e Espaço</h1>
    </div>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // ==================== CONFIGURAÇÃO ====================
    let studentName = "";
    let currentQuestion = 0;
    let quizStarted = false;
    let userAnswers = [];
    
    // ==================== 20 QUESTÕES (TODAS COM 4 ALTERNATIVAS) ====================
    const questionsData = [
        { text: "O espaço geográfico, segundo Milton Santos, é definido como:", options: ["Um palco vazio onde a sociedade se instala", "Um conjunto indissociável de sistemas de objetos e sistemas de ações", "Apenas o território delimitado por fronteiras políticas", "Somente os elementos naturais da paisagem"], correct: 1, justification: "Milton Santos definiu o espaço como a união indissociável entre sistemas de objetos (materialidades) e sistemas de ações (relações sociais). (Página 1)" },
        
        { text: "Para Karl Marx, o trabalho é entendido como:", options: ["Apenas uma atividade física sem relação com a natureza", "O 'metabolismo entre o homem e a natureza', troca de matéria e energia", "Uma ação exclusivamente individual sem impacto social", "Um processo que não modifica o meio ambiente"], correct: 1, justification: "Marx utilizou a expressão 'metabolismo' para descrever a relação fundamental entre sociedade e natureza mediada pelo trabalho. (Página 1)" },
        
        { text: "A pegada ecológica atual indica que a humanidade consome os recursos de aproximadamente:", options: ["0,7 planeta Terra por ano", "1,0 planeta Terra por ano", "1,7 planetas Terra por ano", "2,5 planetas Terra por ano"], correct: 2, justification: "A pegada ecológica atual é de 1,7 planetas Terra por ano, indicando que vivemos além da capacidade de regeneração do planeta. (Página 2)" },
        
        { text: "Das escalas temporais abaixo, qual é a mais lenta (maior duração)?", options: ["Tempo cotidiano", "Tempo social", "Tempo histórico", "Tempo geológico"], correct: 3, justification: "O tempo geológico é extremamente lento, medido em milhões ou bilhões de anos. (Página 2)" },
        
        { text: "Nas sociedades tradicionais, a relação com a natureza é caracterizada por:", options: ["Visão utilitarista e alto impacto ambiental global", "Visão sagrada, baixo impacto ambiental e respeito aos ciclos naturais", "Exploração intensiva de recursos não renováveis", "Técnicas complexas movidas por energia fóssil"], correct: 1, justification: "Nas sociedades tradicionais, a natureza é vista como sagrada, com baixo impacto ambiental local. (Página 3)" },
        
        { text: "O conceito de 'meio técnico-científico-informacional', proposto por Milton Santos, refere-se:", options: ["Ao período anterior à Revolução Industrial", "À fase atual onde técnica, ciência e informação se combinam em um espaço globalizado", "A um modelo agrícola baseado em tração animal", "A um sistema de transporte baseado em velas e ventos"], correct: 1, justification: "O meio técnico-científico-informacional é a fase atual, com espaço globalizado e ações em tempo real. (Página 4)" },
        
        { text: "Qual das alternativas NÃO é considerada um marcador do Antropoceno?", options: ["Radionuclídeos artificiais de testes nucleares", "Plásticos e microplásticos", "Fósseis de dinossauros", "Concreto e alumínio puro"], correct: 2, justification: "Fósseis de dinossauros pertencem a eras anteriores ao Antropoceno. Os demais são marcas da ação humana recente. (Página 6)" },
        
        { text: "A projeção cartográfica de Mercator é frequentemente criticada porque:", options: ["Conserva perfeitamente as áreas dos continentes", "Amplia exageradamente as áreas polares, supervalorizando a Europa", "Não permite navegação marítima", "É uma projeção política socialista"], correct: 1, justification: "A projeção de Mercator amplia as áreas de altas latitudes, fazendo a Europa parecer maior que a África e a América do Sul. (Página 8)" },
        
        { text: "Os 'sistemas de objetos' na definição de espaço de Milton Santos correspondem a:", options: ["Apenas os elementos naturais da paisagem", "As materialidades construídas pela sociedade", "As leis e normas que regulam o uso do solo", "Os sentimentos de pertencimento ao território"], correct: 1, justification: "Sistemas de objetos são as materialidades, as coisas construídas pela sociedade. (Página 1)" },
        
        { text: "A impermeabilização do solo nas áreas urbanas está diretamente associada a:", options: ["Aumento da infiltração de água no solo", "Redução do escoamento superficial", "Enchentes e alagamentos urbanos", "Diminuição da temperatura local"], correct: 2, justification: "A impermeabilização por asfalto e concreto reduz a infiltração, aumenta o escoamento superficial e causa enchentes. (Página 5)" },
        
        { text: "O indicador que mede a área de terra e água necessária para sustentar um padrão de consumo é chamado de:", options: ["Overshoot", "Pegada ecológica", "Metabolismo social", "Antropoceno"], correct: 1, justification: "A pegada ecológica calcula a área produtiva necessária para sustentar um determinado padrão de consumo. (Página 2)" },
        
        { text: "A abordagem política do território, associada a Ratzel, enfatiza:", options: ["O território como espaço vivido e identidade cultural", "O território como extensão do poder do Estado e espaço vital", "O território como rede de fluxos e conexões", "O território como espaço sagrado e simbólico"], correct: 1, justification: "Ratzel é associado à abordagem política do território, focada no poder estatal e no espaço vital (Lebensraum). (Página 10)" },
        
        { text: "O termo em inglês que descreve o fenômeno de viver além da capacidade de regeneração do planeta é:", options: ["Overload", "Overcharge", "Overshoot", "Overheat"], correct: 2, justification: "O termo overshoot (superação ecológica) descreve o consumo além da capacidade de regeneração da Terra. (Página 2)" },
        
        { text: "A escala temporal que mede processos que ocorrem em horas, dias ou semanas é chamada de:", options: ["Tempo geológico", "Tempo histórico", "Tempo social", "Tempo cotidiano"], correct: 3, justification: "O tempo cotidiano é o ritmo das atividades diárias, medido em horas, dias e semanas. (Página 2)" },
        
        { text: "A ordem cronológica correta das camadas temporais da paisagem brasileira é:", options: ["Contemporânea → Industrial → Imperial → Colonial → Pré-colonial", "Pré-colonial → Colonial → Imperial → Industrial → Contemporânea", "Colonial → Pré-colonial → Imperial → Contemporânea → Industrial", "Imperial → Colonial → Pré-colonial → Industrial → Contemporânea"], correct: 1, justification: "A ordem segue a cronologia histórica do Brasil: pré-colonial, colonial, imperial, industrial e contemporânea. (Página 7)" },
        
        { text: "Sobre o impacto ambiental das sociedades urbano-industriais, é correto afirmar que:", options: ["É local, reversível e de baixa escala", "É global, muitas vezes irreversível e de alta escala", "Não causa impactos significativos", "É idêntico ao das sociedades tradicionais"], correct: 1, justification: "As sociedades urbano-industriais causam impacto ambiental global, muitas vezes irreversível e de alta escala. (Página 3)" },
        
        { text: "Analise as afirmativas sobre o Antropoceno: I - O termo foi proposto por Paul Crutzen. II - Já foi oficialmente reconhecido pela União Internacional de Ciências Geológicas. III - Entre seus marcadores estão radionuclídeos e plásticos. Assinale a alternativa correta:", options: ["Apenas I e II estão corretas", "Apenas I e III estão corretas", "Apenas II e III estão corretas", "Todas estão corretas"], correct: 1, justification: "Crutzen propôs o termo, mas o Antropoceno ainda NÃO foi oficialmente reconhecido pela IUGS. Os marcadores citados estão corretos. (Página 6)" },
        
        { text: "A geotecnologia mais adequada para mapear sítios arqueológicos cobertos por florestas densas é:", options: ["GPS diferencial", "LiDAR", "SAR", "SIG temporal"], correct: 1, justification: "O LiDAR (Light Detection and Ranging) utiliza pulsos de laser que penetram a cobertura vegetal para mapear o solo abaixo. (Página 9)" },
        
        { text: "O método de análise territorial que sobrepõe diferentes mapas temáticos para identificar áreas críticas é utilizado por:", options: ["Apenas pelo IBGE", "Pelo Instituto Socioambiental (ISA) e pela CPT", "Exclusivamente pelo Exército Brasileiro", "Somente por empresas de mineração"], correct: 1, justification: "ISA e CPT utilizam essa metodologia para produzir relatórios sobre conflitos na Amazônia. (Página 11)" },
        
        { text: "A projeção de Peters foi proposta como uma alternativa crítica à projeção de Mercator porque:", options: ["Conserva as formas dos continentes perfeitamente", "Conserva as áreas, denunciando a visão eurocêntrica de Mercator", "É mais antiga e tradicional", "Foi desenvolvida para navegação marítima"], correct: 1, justification: "A projeção de Peters (1973) é uma projeção equivalente (conserva áreas) e foi uma crítica à visão eurocêntrica de Mercator. (Página 9)" }
    ];
    
    // ==================== FUNÇÕES ====================
    function updateProgressBar() {
        const percent = ((currentQuestion + 1) / questionsData.length) * 100;
        document.getElementById('progressBar').style.width = percent + '%';
    }
    
    function renderNameScreen() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="name-screen name-form">
                <h2>📝 Identificação</h2>
                <p>Digite seu nome completo para iniciar o quiz:</p>
                <input type="text" id="studentNameInput" placeholder="Seu nome" autocomplete="off">
                <br>
                <button class="btn btn-success" id="startQuizBtn">▶️ Iniciar Quiz</button>
            </div>
        `;
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            const input = document.getElementById('studentNameInput');
            if (input && input.value.trim()) {
                studentName = input.value.trim();
                quizStarted = true;
                userAnswers = new Array(questionsData.length).fill(null);
                currentQuestion = 0;
                renderQuestion();
            } else {
                alert("Por favor, digite seu nome.");
            }
        });
    }
    
    function renderQuestion() {
        const q = questionsData[currentQuestion];
        const isAnswered = userAnswers[currentQuestion] !== null;
        const selectedAnswer = userAnswers[currentQuestion];
        
        let optionsHtml = '<ul class="options">';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedAnswer === idx);
            optionsHtml += `<li data-opt="${idx}" class="${isAnswered ? 'disabled' : ''} ${isSelected ? 'selected' : ''}">${opt}</li>`;
        });
        optionsHtml += '</ul>';
        
        const feedbackHtml = isAnswered ? `
            <div class="feedback ${userAnswers[currentQuestion] === q.correct ? 'correct' : 'wrong'}">
                <strong>${userAnswers[currentQuestion] === q.correct ? '✓ Correto!' : '✗ Incorreto!'}</strong><br>
                ${q.justification}
            </div>
        ` : '';
        
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="quiz-screen">
                <div class="question-info">
                    <span>Questão ${currentQuestion + 1} de ${questionsData.length}</span>
                    <span>${Math.round(((currentQuestion + 1) / questionsData.length) * 100)}%</span>
                </div>
                <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
                ${optionsHtml}
                ${feedbackHtml}
                <div class="nav-buttons">
                    <button class="btn" id="prevBtn" ${currentQuestion === 0 ? 'disabled' : ''}>◀ Anterior</button>
                    <button class="btn" id="nextBtn" ${!isAnswered ? 'disabled' : ''}>${currentQuestion === questionsData.length - 1 ? '✅ Finalizar' : 'Próxima ▶'}</button>
                </div>
            </div>
        `;
        
        // Eventos para opções
        const options = document.querySelectorAll('.options li');
        options.forEach(opt => {
            opt.addEventListener('click', () => {
                if (userAnswers[currentQuestion] !== null) return;
                const selected = parseInt(opt.dataset.opt);
                userAnswers[currentQuestion] = selected;
                renderQuestion();
            });
        });
        
        // Botões de navegação
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });
        
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (userAnswers[currentQuestion] === null) return;
            if (currentQuestion === questionsData.length - 1) {
                calculateResult();
            } else {
                currentQuestion++;
                renderQuestion();
            }
        });
        
        updateProgressBar();
    }
    
    function calculateResult() {
        let correctCount = 0;
        const mistakes = [];
        
        questionsData.forEach((q, idx) => {
            const userAnswer = userAnswers[idx];
            if (userAnswer === q.correct) {
                correctCount++;
            } else {
                mistakes.push({
                    number: idx + 1,
                    question: q.text,
                    userAnswer: userAnswer !== null ? q.options[userAnswer] : "Não respondida",
                    correctAnswer: q.options[q.correct],
                    justification: q.justification
                });
            }
        });
        
        const approved = correctCount >= 14;
        renderResultScreen(correctCount, approved, mistakes);
    }
    
    function renderResultScreen(score, approved, mistakes) {
        const main = document.getElementById('mainContent');
        const gradeText = approved ? "APROVADO" : "REPROVADO";
        const gradeClass = approved ? "aprovado" : "reprovado";
        
        let mistakesHtml = '';
        if (mistakes.length > 0) {
            mistakesHtml = `<h3>📋 Questões com erro:</h3><div class="mistake-list">`;
            mistakes.forEach(m => {
                mistakesHtml += `
                    <div class="mistake-item">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
            mistakesHtml += `</div>`;
        } else {
            mistakesHtml = `<p style="color:#155724; background:#d4edda; padding:15px; border-radius:12px;">🎉 Parabéns! Você não errou nenhuma questão!</p>`;
        }
        
        main.innerHTML = `
            <div class="result-screen">
                <div class="result-stats">
                    <h2>📊 Resultado Final</h2>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${new Date().toLocaleString('pt-BR')}</p>
                    <div class="score">${score} / 20</div>
                    <div class="grade ${gradeClass}">${gradeText}</div>
                    ${approved ? '<p>✅ Você atingiu a nota mínima (14/20). Relatório liberado!</p>' : '<p>❌ Você não atingiu a nota mínima (14/20). Estude mais e refaça o quiz.</p>'}
                </div>
                ${mistakesHtml}
                <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    ${approved ? `<button class="btn btn-success" id="printReportBtn">📄 Gerar Relatório PDF</button>` : ''}
                    <button class="btn btn-secondary" id="restartQuizBtn">🔄 Refazer Quiz</button>
                </div>
            </div>
        `;
        
        if (approved) {
            document.getElementById('printReportBtn')?.addEventListener('click', () => {
                generatePDFReport(score, mistakes);
            });
        }
        
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            userAnswers = new Array(questionsData.length).fill(null);
            quizStarted = false;
            currentQuestion = 0;
            renderNameScreen();
            document.getElementById('progressBar').style.width = '0%';
        });
    }
    
    function generatePDFReport(score, mistakes) {
        const printWindow = window.open('', '_blank');
        const dateStr = new Date().toLocaleString('pt-BR');
        let mistakesPrint = '';
        
        if (mistakes.length > 0) {
            mistakesPrint = '<h3>Questões com erro:</h3>';
            mistakes.forEach(m => {
                mistakesPrint += `
                    <div style="margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #ccc;">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
        } else {
            mistakesPrint = '<p>Parabéns! Você acertou todas as questões!</p>';
        }
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Relatório - Quiz Tempo e Espaço</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.5; }
                    h1 { color: #1a5f7a; }
                    .header { text-align: center; margin-bottom: 30px; }
                    .score { font-size: 24px; font-weight: bold; margin: 20px 0; }
                    .approved { color: green; }
                    .mistake-item { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #ddd; }
                    @media print {
                        body { margin: 20px; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>Relatório de Desempenho</h1>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${dateStr}</p>
                    <p><strong>Quiz:</strong> Tempo e Espaço (Avançado)</p>
                    <div class="score">Nota: ${score} / 20</div>
                    <div class="approved">✅ APROVADO (mínimo 14)</div>
                </div>
                ${mistakesPrint}
                <hr>
                <p style="font-size: 12px; color: #666;">Relatório gerado automaticamente pelo sistema de quiz.</p>
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }
    
    // Inicialização
    renderNameScreen();
</script>
</body>
</html>
