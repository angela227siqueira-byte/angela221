<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz - Impactos da Ação Antrópica e o Antropoceno</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f7a, #0d3b4f);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #0d3b4f;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.2rem;
        }

        .progress-bar-container {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }

        .progress-bar {
            background: #28a745;
            height: 8px;
            width: 0%;
            transition: width 0.3s;
        }

        .main-content {
            padding: 30px;
            min-height: 450px;
        }

        .name-screen, .quiz-screen, .result-screen {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .name-form {
            text-align: center;
            padding: 20px;
        }

        .name-form input {
            width: 80%;
            max-width: 300px;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            margin: 20px 0;
            text-align: center;
        }

        h2 {
            color: #0d3b4f;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0d3b4f;
            line-height: 1.4;
        }

        .options {
            list-style: none;
            padding-left: 0;
        }

        .options li {
            margin: 10px 0;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options li:hover {
            background: #e0e0e0;
            transform: translateX(5px);
        }

        .options li.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .options li.disabled:hover {
            transform: none;
        }

        .options li.selected {
            background: #1a5f7a;
            color: white;
            border-color: #1a5f7a;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            line-height: 1.5;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            display: block;
            border-left: 4px solid #28a745;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border-left: 4px solid #dc3545;
        }

        .btn {
            background: #1a5f7a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #0d3b4f;
            transform: scale(1.02);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .result-stats {
            text-align: center;
            padding: 20px;
            background: #f0f2f5;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .grade {
            font-size: 1.3rem;
            padding: 10px;
            border-radius: 30px;
            display: inline-block;
            margin: 10px 0;
        }

        .grade.aprovado { background: #d4edda; color: #155724; }
        .grade.reprovado { background: #f8d7da; color: #721c24; }

        .mistake-list {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .mistake-item {
            background: white;
            border-left: 4px solid #dc3545;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #666;
            font-size: 0.9rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 20px;
            }
            .question-text {
                font-size: 1rem;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌍 Quiz: Impactos da Ação Antrópica e o Antropoceno</h1>
    </div>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // ==================== CONFIGURAÇÃO ====================
    let studentName = "";
    let currentQuestion = 0;
    let quizStarted = false;
    let userAnswers = [];
    
    // ==================== 20 QUESTÕES (TEMA 3) ====================
    const questionsData = [
        { text: "O termo 'Antropoceno' foi proposto pelo químico:", options: ["Albert Einstein", "Paul Crutzen", "Charles Darwin", "Isaac Newton"], correct: 1, justification: "Paul Crutzen, Prêmio Nobel de Química, propôs o termo Antropoceno no início dos anos 2000." },
        
        { text: "O Antropoceno propõe uma nova época geológica marcada por:", options: ["A extinção dos dinossauros", "A formação da Pangeia", "A ação humana como força geológica de escala planetária", "O surgimento das primeiras bactérias"], correct: 2, justification: "O Antropoceno é caracterizado pelo impacto humano como força geológica capaz de alterar o sistema Terra." },
        
        { text: "Qual dos seguintes NÃO é considerado um marcador do Antropoceno?", options: ["Radionuclídeos de testes nucleares", "Plásticos e microplásticos", "Fósseis de trilobitas", "Concreto e alumínio puro"], correct: 2, justification: "Fósseis de trilobitas são de eras paleozoicas, muito anteriores ao Antropoceno." },
        
        { text: "O fenômeno do aquecimento global está diretamente relacionado ao aumento da concentração de:", options: ["Oxigênio (O₂)", "Nitrogênio (N₂)", "Dióxido de carbono (CO₂)", "Argônio (Ar)"], correct: 2, justification: "O aumento de CO₂ proveniente da queima de combustíveis fósseis intensifica o efeito estufa." },
        
        { text: "A queima de combustíveis fósseis e o desmatamento são as principais causas do aumento de:", options: ["Camada de ozônio", "Gases de efeito estufa", "Oxigênio atmosférico", "Nitrogênio no solo"], correct: 1, justification: "Essas atividades liberam grandes quantidades de CO₂ e outros gases de efeito estufa." },
        
        { text: "O esgoto industrial e doméstico não tratado causa principalmente:", options: ["Aquecimento global", "Poluição da água e eutrofização", "Destruição da camada de ozônio", "Desertificação"], correct: 1, justification: "O lançamento de esgoto polui rios e lagos, causando proliferação de algas e morte de peixes." },
        
        { text: "A impermeabilização do solo nas áreas urbanas está diretamente associada a:", options: ["Aumento da infiltração de água", "Redução das enchentes", "Enchentes e alagamentos urbanos", "Melhora da qualidade da água"], correct: 2, justification: "Asfalto e concreto impedem a infiltração, aumentando o escoamento superficial e as enchentes." },
        
        { text: "O conceito de 'pegada ecológica' mede:", options: ["O tamanho do calçado de uma pessoa", "A área produtiva necessária para sustentar um padrão de consumo", "A quantidade de lixo produzida", "A emissão de carbono por veículo"], correct: 1, justification: "A pegada ecológica calcula a área de terra e água necessária para sustentar um padrão de consumo." },
        
        { text: "Atualmente, a pegada ecológica da humanidade indica que consumimos os recursos de aproximadamente:", options: ["0,5 planeta Terra", "1,0 planeta Terra", "1,7 planetas Terra", "3,0 planetas Terra"], correct: 2, justification: "A humanidade consome os recursos de 1,7 planetas Terra por ano, vivendo em overshoot." },
        
        { text: "O fenômeno de viver além da capacidade de regeneração do planeta é chamado de:", options: ["Overshoot", "Underload", "Downshift", "Eco-balance"], correct: 0, justification: "Overshoot (superação ecológica) ocorre quando o consumo excede a capacidade de regeneração." },
        
        { text: "A destruição de habitats naturais e a caça predatória levam principalmente a:", options: ["Aumento da biodiversidade", "Extinção de espécies e perda de biodiversidade", "Melhora dos ecossistemas", "Regeneração florestal"], correct: 1, justification: "Essas atividades reduzem a biodiversidade e podem levar à extinção de espécies." },
        
        { text: "Qual das seguintes atividades é a maior responsável pelas emissões de metano (CH₄)?", options: ["Transporte rodoviário", "Indústria siderúrgica", "Pecuária e decomposição de matéria orgânica", "Geração de energia solar"], correct: 2, justification: "A pecuária e a decomposição de resíduos orgânicos são grandes fontes de metano." },
        
        { text: "O derretimento das calotas polares e o aumento do nível do mar são consequências diretas de:", options: ["Aquecimento global", "Buraco na camada de ozônio", "Chuva ácida", "Desertificação"], correct: 0, justification: "O aquecimento global eleva a temperatura, derretendo geleiras e expandindo a água dos oceanos." },
        
        { text: "O plástico nos oceanos causa impactos como:", options: ["Aumento da biodiversidade marinha", "Ingestão por animais marinhos e contaminação da cadeia alimentar", "Melhora da qualidade da água", "Redução da poluição"], correct: 1, justification: "Animais marinhos ingerem plástico, causando morte e contaminação da cadeia alimentar." },
        
        { text: "A camada de ozônio é importante porque:", options: ["Retém calor na atmosfera", "Produz oxigênio para respiração", "Bloqueia os raios ultravioleta prejudiciais", "Regula as marés"], correct: 2, justification: "A camada de ozônio filtra a maior parte da radiação ultravioleta do Sol." },
        
        { text: "O Protocolo de Montreal (1987) foi um acordo internacional para:", options: ["Reduzir emissões de CO₂", "Eliminar substâncias que destroem a camada de ozônio", "Proteger florestas tropicais", "Regular a pesca oceânica"], correct: 1, justification: "O protocolo proibiu os CFCs, responsáveis pela destruição da camada de ozônio." },
        
        { text: "Analise as afirmativas sobre o Antropoceno: I - Ainda não foi oficialmente reconhecido pela IUGS. II - Já é amplamente utilizado pela comunidade científica. III - Teve seu início marcado pela Revolução Industrial. Assinale a alternativa correta:", options: ["Apenas I e II estão corretas", "Apenas I e III estão corretas", "Apenas II e III estão corretas", "Todas estão corretas"], correct: 3, justification: "Todas as afirmativas estão corretas: não foi oficializado, mas é usado; seu início é associado à Revolução Industrial." },
        
        { text: "A erosão do solo é acelerada principalmente por:", options: ["Reflorestamento", "Desmatamento e agricultura intensiva", "Preservação de matas ciliares", "Rotação de culturas"], correct: 1, justification: "O desmatamento e a agricultura intensiva removem a cobertura vegetal, expondo o solo à erosão." },
        
        { text: "O termo 'overshoot' refere-se a:", options: ["Excesso de produção agrícola", "Consumo além da capacidade de regeneração do planeta", "Superpopulação urbana", "Excesso de chuvas"], correct: 1, justification: "Overshoot é o momento em que o consumo ultrapassa a capacidade de regeneração dos recursos." },
        
        { text: "A 'sexta extinção' é um conceito que se refere a:", options: ["Extinção dos dinossauros", "Extinção em massa atual causada pela ação humana", "Extinção natural de espécies", "Extinção de plantas apenas"], correct: 1, justification: "A sexta extinção é a atual crise de extinção de espécies causada principalmente pela ação humana." }
    ];
    
    // ==================== FUNÇÕES ====================
    function updateProgressBar() {
        const percent = ((currentQuestion + 1) / questionsData.length) * 100;
        document.getElementById('progressBar').style.width = percent + '%';
    }
    
    function renderNameScreen() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="name-screen name-form">
                <h2>📝 Identificação</h2>
                <p>Digite seu nome completo para iniciar o quiz:</p>
                <input type="text" id="studentNameInput" placeholder="Seu nome" autocomplete="off">
                <br>
                <button class="btn btn-success" id="startQuizBtn">▶️ Iniciar Quiz</button>
            </div>
        `;
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            const input = document.getElementById('studentNameInput');
            if (input && input.value.trim()) {
                studentName = input.value.trim();
                quizStarted = true;
                userAnswers = new Array(questionsData.length).fill(null);
                currentQuestion = 0;
                renderQuestion();
            } else {
                alert("Por favor, digite seu nome.");
            }
        });
    }
    
    function renderQuestion() {
        const q = questionsData[currentQuestion];
        const isAnswered = userAnswers[currentQuestion] !== null;
        const selectedAnswer = userAnswers[currentQuestion];
        
        let optionsHtml = '<ul class="options">';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedAnswer === idx);
            optionsHtml += `<li data-opt="${idx}" class="${isAnswered ? 'disabled' : ''} ${isSelected ? 'selected' : ''}">${opt}</li>`;
        });
        optionsHtml += '</ul>';
        
        const feedbackHtml = isAnswered ? `
            <div class="feedback ${userAnswers[currentQuestion] === q.correct ? 'correct' : 'wrong'}">
                <strong>${userAnswers[currentQuestion] === q.correct ? '✓ Correto!' : '✗ Incorreto!'}</strong><br>
                ${q.justification}
            </div>
        ` : '';
        
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="quiz-screen">
                <div class="question-info">
                    <span>Questão ${currentQuestion + 1} de ${questionsData.length}</span>
                    <span>${Math.round(((currentQuestion + 1) / questionsData.length) * 100)}%</span>
                </div>
                <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
                ${optionsHtml}
                ${feedbackHtml}
                <div class="nav-buttons">
                    <button class="btn" id="prevBtn" ${currentQuestion === 0 ? 'disabled' : ''}>◀ Anterior</button>
                    <button class="btn" id="nextBtn" ${!isAnswered ? 'disabled' : ''}>${currentQuestion === questionsData.length - 1 ? '✅ Finalizar' : 'Próxima ▶'}</button>
                </div>
            </div>
        `;
        
        const options = document.querySelectorAll('.options li');
        options.forEach(opt => {
            opt.addEventListener('click', () => {
                if (userAnswers[currentQuestion] !== null) return;
                const selected = parseInt(opt.dataset.opt);
                userAnswers[currentQuestion] = selected;
                renderQuestion();
            });
        });
        
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });
        
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (userAnswers[currentQuestion] === null) return;
            if (currentQuestion === questionsData.length - 1) {
                calculateResult();
            } else {
                currentQuestion++;
                renderQuestion();
            }
        });
        
        updateProgressBar();
    }
    
    function calculateResult() {
        let correctCount = 0;
        const mistakes = [];
        
        questionsData.forEach((q, idx) => {
            const userAnswer = userAnswers[idx];
            if (userAnswer === q.correct) {
                correctCount++;
            } else {
                mistakes.push({
                    number: idx + 1,
                    question: q.text,
                    userAnswer: userAnswer !== null ? q.options[userAnswer] : "Não respondida",
                    correctAnswer: q.options[q.correct],
                    justification: q.justification
                });
            }
        });
        
        const approved = correctCount >= 14;
        renderResultScreen(correctCount, approved, mistakes);
    }
    
    function renderResultScreen(score, approved, mistakes) {
        const main = document.getElementById('mainContent');
        const gradeText = approved ? "APROVADO" : "REPROVADO";
        const gradeClass = approved ? "aprovado" : "reprovado";
        
        let mistakesHtml = '';
        if (mistakes.length > 0) {
            mistakesHtml = `<h3>📋 Questões com erro:</h3><div class="mistake-list">`;
            mistakes.forEach(m => {
                mistakesHtml += `
                    <div class="mistake-item">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
            mistakesHtml += `</div>`;
        } else {
            mistakesHtml = `<p style="color:#155724; background:#d4edda; padding:15px; border-radius:12px;">🎉 Parabéns! Você não errou nenhuma questão!</p>`;
        }
        
        main.innerHTML = `
            <div class="result-screen">
                <div class="result-stats">
                    <h2>📊 Resultado Final</h2>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${new Date().toLocaleString('pt-BR')}</p>
                    <div class="score">${score} / 20</div>
                    <div class="grade ${gradeClass}">${gradeText}</div>
                    ${approved ? '<p>✅ Você atingiu a nota mínima (14/20). Relatório liberado!</p>' : '<p>❌ Você não atingiu a nota mínima (14/20). Estude mais e refaça o quiz.</p>'}
                </div>
                ${mistakesHtml}
                <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    ${approved ? `<button class="btn btn-success" id="printReportBtn">📄 Gerar Relatório PDF</button>` : ''}
                    <button class="btn btn-secondary" id="restartQuizBtn">🔄 Refazer Quiz</button>
                </div>
            </div>
        `;
        
        if (approved) {
            document.getElementById('printReportBtn')?.addEventListener('click', () => {
                generatePDFReport(score, mistakes);
            });
        }
        
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            userAnswers = new Array(questionsData.length).fill(null);
            quizStarted = false;
            currentQuestion = 0;
            renderNameScreen();
            document.getElementById('progressBar').style.width = '0%';
        });
    }
    
    function generatePDFReport(score, mistakes) {
        const printWindow = window.open('', '_blank');
        const dateStr = new Date().toLocaleString('pt-BR');
        let mistakesPrint = '';
        
        if (mistakes.length > 0) {
            mistakesPrint = '<h3>Questões com erro:</h3>';
            mistakes.forEach(m => {
                mistakesPrint += `
                    <div style="margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #ccc;">
                        <strong>Questão ${m.number}</strong><br>
                        <strong>Pergunta:</strong> ${m.question}<br>
                        <strong>Sua resposta:</strong> ${m.userAnswer}<br>
                        <strong>Resposta correta:</strong> ${m.correctAnswer}<br>
                        <strong>Justificativa:</strong> ${m.justification}
                    </div>
                `;
            });
        } else {
            mistakesPrint = '<p>Parabéns! Você acertou todas as questões!</p>';
        }
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Relatório - Impactos da Ação Antrópica e Antropoceno</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.5; }
                    h1 { color: #1a5f7a; }
                    .header { text-align: center; margin-bottom: 30px; }
                    .score { font-size: 24px; font-weight: bold; margin: 20px 0; }
                    .approved { color: green; }
                    @media print {
                        body { margin: 20px; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>Relatório de Desempenho</h1>
                    <p><strong>Aluno(a):</strong> ${studentName}</p>
                    <p><strong>Data:</strong> ${dateStr}</p>
                    <p><strong>Quiz:</strong> Impactos da Ação Antrópica e o Antropoceno</p>
                    <div class="score">Nota: ${score} / 20</div>
                    <div class="approved">✅ APROVADO (mínimo 14)</div>
                </div>
                ${mistakesPrint}
                <hr>
                <p style="font-size: 12px; color: #666;">Relatório gerado automaticamente pelo sistema de quiz.</p>
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }
    
    renderNameScreen();
</script>
</body>
</html>
